<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurum Division - Executive Catalog</title>
  <meta name="description" content="Executive-grade catalog experience for Site B." />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preload" href="./themes/corporate-luxe/q7r8s2t4.css?v=20260305-1" as="style" />
  <link rel="stylesheet" href="./themes/corporate-luxe/q7r8s2t4.css?v=20260305-1" />
  <!-- Reserve theme (manual): <link rel="stylesheet" href="./themes/deep-teal/unified-theme.css?v=20260305-1" /> -->
</head>
<body data-site="b">
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <main class="shell">
    <header class="hero reveal">
      <p class="eyebrow">Aurum Division</p>
      <h1>Executive Catalog</h1>
      <p class="subtitle">Premium selection interface for corporate procurement teams.</p>
    </header>

    <section class="toolbar reveal">
      <div class="toolbar-row">
        <input id="q" class="field grow" type="search" placeholder="Search products by text or price..." />
        <select id="sort" class="field">
          <option value="new">Newest</option>
          <option value="old">Oldest</option>
        </select>
        <select id="view" class="field">
          <option value="grid">Showcase</option>
          <option value="list">Executive List</option>
        </select>
        <button id="refresh" class="btn" type="button">Refresh</button>
      </div>
      <div class="meta">
        <span>Status: <b id="status">Loading...</b></span>
        <span>Visible: <b id="count">0</b></span>
      </div>
    </section>

    <section id="workspace" class="workspace reveal"></section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script defer src="./themes/shared/mock-data.js?v=20260305-1"></script>
  <script defer src="./themes/shared/image-fallbacks.js?v=20260305-1"></script>
  <script defer src="./themes/corporate-luxe/q7r8s2t4.js?v=20260305-3"></script>
</body>
</html>
