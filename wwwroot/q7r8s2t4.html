<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog – list view</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family:system-ui, sans-serif; }
    /* subtle skeleton for list entries */
    .skeleton {
      background: linear-gradient(90deg, rgba(200,200,200,.1), rgba(200,200,200,.2), rgba(200,200,200,.1));
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>

<body data-site="b" class="bg-gray-50 text-gray-900">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
    <header class="mb-6">
      <h1 class="text-3xl font-extrabold uppercase tracking-tight">Catalog</h1>
      <p class="text-gray-600">A stripped‑down list of the latest products. Click the link to view.</p>
    </header>

    <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-4">
      <input id="q" type="search" placeholder="Filter…"
        class="flex-1 px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" />

      <div class="flex gap-2">
        <button id="refresh"
          class="px-3 py-2 bg-indigo-100 text-indigo-700 border border-indigo-200 rounded hover:bg-indigo-200 transition">
          ⟳
        </button>

        <select id="sort"
          class="px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="new">Newest</option>
          <option value="old">Oldest</option>
        </select>
      </div>
    </div>

    <div class="flex justify-between text-sm text-gray-500 mb-2">
      <div id="status">Loading…</div>
      <div id="count"></div>
    </div>

    <div id="grid" class="mt-2 space-y-2"></div>

    <footer class="mt-10 text-xs text-gray-400">
      Simple catalog • data provided by the source.
    </footer>
  </div>

  <script src="./viewer.js"></script>
</body>
</html>
