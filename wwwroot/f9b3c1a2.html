<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Catalog</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12), rgba(255,255,255,.06));
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .line-clamp-3{
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
    }
  </style>
</head>

<body data-site="a" class="bg-slate-950 text-slate-100">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="flex flex-col gap-2">
      <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Product Catalog</h1>
      <p class="text-slate-350">
        이 게시물은 쿠팡파트너스 활동의일환으로,이에따른 일정액의 수수료를 제공받습니다.
      </p>
    </div>

    <div class="mt-6 flex flex-col md:flex-row md:items-center gap-3">
      <div class="flex-1">
        <input id="q" type="search" placeholder="Search products..."
          class="w-full px-4 py-3 rounded-2xl bg-slate-900 border border-slate-800 outline-none focus:border-slate-500" />
      </div>

      <div class="flex gap-3">
        <button id="refresh"
          class="px-4 py-3 rounded-2xl bg-slate-900 border border-slate-800 hover:border-slate-600 transition">
          Refresh
        </button>

        <select id="sort"
          class="px-4 py-3 rounded-2xl bg-slate-900 border border-slate-800 outline-none focus:border-slate-500">
          <option value="new">Newest</option>
          <option value="old">Oldest</option>
        </select>
      </div>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
      <div id="status">Loading...</div>
      <div id="count"></div>
    </div>

    <div id="grid" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div class="mt-10 text-xs text-slate-500">
      Catalog viewer • Images and links are provided by the product source.
    </div>
  </div>

  <!-- only ONE script -->
  <script src="./viewer.js" defer></script>
</body>
</html>
