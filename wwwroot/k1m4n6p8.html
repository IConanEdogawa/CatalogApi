<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Forge Catalog</title>
  <link rel="stylesheet" href="./themes/steampunk/k1m4n6p8.css?v=20260305-3" />
  <!-- Reserve theme (manual): <link rel="stylesheet" href="./themes/deep-teal/unified-theme.css?v=20260305-1" /> -->
</head>
<body>
  <main class="frame" data-site="c">
    <section class="topbar">
      <h1 class="title">Aether Forge Catalogue</h1>
      <p class="subtitle">Experimental steampunk storefront for Site C</p>
    </section>

    <section class="controls">
      <div class="row">
        <input id="q" class="field" type="search" placeholder="Search by text or price..." />
        <select id="sort" class="select">
          <option value="new">Newest</option>
          <option value="old">Oldest</option>
        </select> 
        <select id="view" class="select">
          <option value="cabinet">Cabinet</option>
          <option value="ledger">Ledger</option>
        </select>
        <button id="refresh" class="button" type="button">Recalibrate</button>
      </div>
      <div class="meta">
        <div>Status: <b id="status">Loading...</b></div>
        <div>Visible units: <b id="count">0</b></div>
      </div>
    </section>

    <section id="workspace" class="workspace"></section>
  </main>

  <script defer src="./themes/shared/mock-data.js?v=20260305-1"></script>
  <script defer src="./themes/shared/image-fallbacks.js?v=20260305-1"></script>
  <script defer src="./themes/steampunk/k1m4n6p8.js?v=20260305-2"></script>
</body>
</html>
