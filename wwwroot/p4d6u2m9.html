<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="./manifest-catalog.webmanifest" />
  <title>Product Info</title>
  <link rel="stylesheet" href="./css/tailwind.css" />
</head>
<body class="bg-slate-950 text-slate-100">
  <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 space-y-6">
    <div class="flex items-center justify-between gap-3">
      <a id="brandTitle" href="./f9b3c1a2.html" class="text-2xl sm:text-3xl font-bold tracking-tight hover:text-emerald-300 transition">Opanot com</a>
      <a id="backLink" href="/f9b3c1a2.html" class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 transition">Back</a>
    </div>

    <div id="status" class="text-slate-400">Loading...</div>

    <section id="content" class="hidden rounded-2xl border border-slate-800 bg-slate-900 p-5">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="rounded-xl overflow-hidden bg-slate-950 border border-slate-800 aspect-[4/3]">
          <img id="image" alt="product" class="w-full h-full object-cover" loading="lazy" />
        </div>

        <div class="space-y-4">
          <div class="space-y-2">
            <div id="discountBadge" class="inline-flex items-center px-2 py-1 rounded-lg bg-rose-500/15 text-rose-300 font-semibold text-sm"></div>
            <div id="currentCost" class="text-2xl font-bold text-emerald-300"></div>
            <div id="originalCost" class="text-slate-400 line-through"></div>
            <div id="lowestCost" class="text-slate-300"></div>
          </div>

          <p id="text" class="text-slate-200"></p>

          <div id="extraInfoBlock" class="hidden rounded-xl border border-slate-800 bg-slate-950/60 p-3">
            <div class="text-xs uppercase tracking-wide text-slate-400">Additional info</div>
            <p id="extraInfoText" class="mt-1 text-slate-200 whitespace-pre-line"></p>
          </div>

          <div class="flex flex-wrap gap-2">
            <a id="productLink" href="#" target="_blank" rel="noopener" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500 transition">Open Product</a>
          </div>
        </div>
      </div>
    </section>

    <section id="historySection" class="hidden rounded-2xl border border-slate-800 bg-slate-900 p-5">
      <h2 id="historyTitle" class="text-lg font-semibold">Price History</h2>
      <div class="mt-3 overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-slate-400 border-b border-slate-800">
              <th class="py-2 pr-2">Date</th>
              <th class="py-2 pr-2">Cost</th>
              <th class="py-2 pr-2">Record ID</th>
            </tr>
          </thead>
          <tbody id="historyRows" class="divide-y divide-slate-800"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./pwa-register.js"></script>
  <script src="./mock-products.js?v=20260307-1"></script>
  <script src="./product-info.js?v=20260307-1"></script>
</body>
</html>
