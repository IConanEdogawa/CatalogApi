<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="./manifest-catalog.webmanifest" />
  <title>Catalog</title>

  <link rel="stylesheet" href="./css/tailwind.css" />
  <!-- Reserve theme (manual): <link rel="stylesheet" href="./themes/deep-teal/unified-theme.css?v=20260305-1" /> -->

  <style>
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12), rgba(255,255,255,.06));
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .line-clamp-3{
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
    }
  </style>
</head>

<body data-site="a" class="bg-slate-950 text-slate-100">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="flex flex-col gap-2">
      <a id="brandTitle" href="./f9b3c1a2.html" class="text-2xl sm:text-3xl font-bold tracking-tight hover:text-emerald-300 transition">Opanot com</a>
      <p id="siteNotice" class="text-slate-350">
        이 게시물은 쿠팡파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.
      </p>
    </div>

    <div class="mt-6 flex flex-col md:flex-row md:items-center gap-3">
      <div class="flex-1">
        <input id="q" type="search" placeholder="Search products..."
          class="w-full px-4 py-3 rounded-2xl bg-slate-900 border border-slate-800 outline-none focus:border-slate-500" />
      </div>

      <div class="flex gap-3">
        <a id="adminLink"
          href="./z3x9v7w1.html"
          class="hidden px-4 py-3 rounded-2xl bg-indigo-700/80 border border-indigo-600 hover:bg-indigo-600 transition">
          Admin
        </a>

        <button id="refresh"
          class="px-4 py-3 rounded-2xl bg-slate-900 border border-slate-800 hover:border-slate-600 transition">
          <span id="refreshLabel">Refresh</span>
        </button>

        <select id="sort"
          class="px-4 py-3 rounded-2xl bg-slate-900 border border-slate-800 outline-none focus:border-slate-500">
          <option id="sortNewLabel" value="new">Newest</option>
          <option id="sortOldLabel" value="old">Oldest</option>
        </select>
      </div>
    </div>

    <div class="mt-4 flex items-center justify-between text-sm text-slate-400">
      <div id="status">Loading...</div>
      <div id="count"></div>
    </div>

    <div id="grid" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div id="footerNote" class="mt-10 text-xs text-slate-500">
      Catalog viewer вЂў Images and links are provided by the product source.
    </div>
  </div>

  <script src="./mock-products.js?v=20260307-1" defer></script>
  <script src="./pwa-register.js" defer></script>
  <script src="./viewer.js" defer></script>
</body>
</html>
