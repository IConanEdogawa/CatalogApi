<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpleCatalog – Clean View</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body data-site="c" class="bg-gray-100 text-gray-900">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <header class="mb-6 text-center">
      <h1 class="text-4xl font-bold tracking-tight">SimpleCatalog</h1>
      <p class="text-gray-600">Минималистичный каталог товаров • данные предоставлены источником</p>
    </header>

    <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-4">
      <input id="q" type="search" placeholder="Поиск товаров..."
        class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400" />

      <div class="flex gap-2">
        <button id="refresh"
          class="px-4 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 transition">
          Обновить
        </button>

        <select id="sort"
          class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="new">Newest</option>
          <option value="old">Oldest</option>
        </select>
      </div>
    </div>

    <div class="flex justify-between text-sm text-gray-500 mb-2">
      <div id="status">Loading…</div>
      <div id="count"></div>
    </div>

    <div id="grid" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <footer class="mt-10 text-xs text-gray-400 text-center">
      © SimpleCatalog — лёгкий просмотр товаров
    </footer>
  </div>

  <!-- общая логика -->
  <script src="./app.js"></script>
</body>
</html>
