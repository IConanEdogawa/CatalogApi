<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="./manifest-admin.webmanifest" />
  <title>Admin Login</title>
  <meta name="color-scheme" content="dark" />
  <style>
    :root{
      --bg:#070A12;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --text:#EAF0FF;
      --muted: rgba(234,240,255,.72);
      --line: rgba(255,255,255,.12);
      --accent1:#7C5CFF;
      --accent2:#22D3EE;
      --danger:#FF5C7A;
      --ok:#2EE59D;
      --shadow: 0 30px 80px rgba(0,0,0,.55);
      --radius: 22px;
      --mx: 50vw;
      --my: 50vh;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      color:var(--text);
      background: radial-gradient(1200px 800px at 20% 10%, rgba(124,92,255,.18), transparent 60%),
                  radial-gradient(1000px 700px at 80% 90%, rgba(34,211,238,.16), transparent 55%),
                  linear-gradient(180deg, #050714 0%, #070A12 60%, #050713 100%);
      overflow-x:hidden;
      cursor: none;
    }

    /* animated blobs */
    .blob{
      position:absolute;
      inset:auto;
      width:520px;height:520px;
      filter: blur(40px);
      opacity:.55;
      animation: floaty 10s ease-in-out infinite;
      pointer-events:none;
      will-change: transform;
    }
    .blob.b1{left:-180px; top:-220px; background: radial-gradient(circle at 30% 30%, rgba(124,92,255,.9), transparent 60%);}
    .blob.b2{right:-220px; bottom:-240px; background: radial-gradient(circle at 60% 50%, rgba(34,211,238,.85), transparent 62%); animation-delay:-3s;}
    @keyframes floaty{
      0%,100%{transform: translate(0,0) scale(1)}
      50%{transform: translate(30px,20px) scale(1.05)}
    }

    .wrap{
      position:relative;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding: clamp(16px, 4vw, 40px);
    }

    .card{
      position: relative;
      width: min(440px, 100%);
      background: linear-gradient(180deg, var(--card) 0%, rgba(255,255,255,.04) 100%);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      transform: translateY(8px);
      animation: popIn .55s cubic-bezier(.2,.9,.2,1) both;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform .2s ease, box-shadow .25s ease;
      z-index: 1;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius: inherit;
      padding:1px;
      background: conic-gradient(from 0deg, rgba(124,92,255,.65), rgba(34,211,238,.65), rgba(124,92,255,.65));
      animation: borderSpin 7.5s linear infinite;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events:none;
      opacity:.65;
    }
    @keyframes borderSpin{
      to{transform: rotate(1turn)}
    }
    .cardGlare{
      position:absolute;
      inset:0;
      border-radius: inherit;
      pointer-events:none;
      background: radial-gradient(320px 240px at var(--gx, 50%) var(--gy, 0%), rgba(255,255,255,.2), transparent 60%);
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 1;
    }
    .card.hovered .cardGlare{opacity:.42}
    @keyframes popIn{
      from{opacity:0; transform: translateY(24px) scale(.98)}
      to{opacity:1; transform: translateY(0) scale(1)}
    }

    .cardTop{
      position: relative;
      z-index: 2;
      padding: 22px 22px 16px;
      background:
        radial-gradient(500px 200px at 20% 0%, rgba(124,92,255,.25), transparent 60%),
        radial-gradient(500px 220px at 80% 0%, rgba(34,211,238,.22), transparent 62%),
        rgba(255,255,255,.02);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .brand{
      display:flex; align-items:center; gap:12px;
    }
    .logo{
      width:42px;height:42px;border-radius:14px;
      background: linear-gradient(135deg, rgba(124,92,255,.9), rgba(34,211,238,.9));
      box-shadow: 0 14px 30px rgba(124,92,255,.22);
      position:relative;
    }
    .logo:after{
      content:"";
      position:absolute; inset:9px;
      border-radius:12px;
      background: rgba(5,10,18,.55);
      border:1px solid rgba(255,255,255,.14);
    }
    h1{margin:0; font-size:18px; letter-spacing:.2px}
    .sub{margin:6px 0 0; font-size:13px; color:var(--muted); line-height:1.35}

    .cardBody{padding: 18px 22px 22px}
    .cardBody, .helper, .footer, .btn { position: relative; z-index: 2; }
    .field{
      margin-top:14px;
      transition: transform .2s ease, filter .2s ease;
    }
    .field:focus-within{
      transform: translateY(-1px);
      filter: brightness(1.03);
    }
    .label{
      display:flex; justify-content:space-between; align-items:center;
      font-size:12px; color: var(--muted);
      margin-bottom:8px;
      transition: color .2s ease;
    }
    .field:focus-within .label{
      color: rgba(34,211,238,.95);
    }
    .input{
      width:100%;
      padding: 14px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--text);
      outline:none;
      transition: border-color .2s ease, transform .08s ease, background .2s ease;
    }
    .input:focus{
      border-color: rgba(34,211,238,.55);
      background: rgba(255,255,255,.06);
      box-shadow: 0 0 0 4px rgba(34,211,238,.12);
    }
    .row{
      display:flex; gap:12px; align-items:center;
    }
    .btn{
      width:100%;
      margin-top:16px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 0;
      cursor:pointer;
      color:#061019;
      font-weight:700;
      letter-spacing:.2px;
      background: linear-gradient(135deg, rgba(124,92,255,1), rgba(34,211,238,1));
      box-shadow: 0 16px 40px rgba(34,211,238,.12);
      transition: transform .08s ease, filter .2s ease;
      position:relative;
      overflow:hidden;
      transform: translate3d(var(--bx, 0px), var(--by, 0px), 0);
      will-change: transform;
    }
    .btn:active{transform: translateY(1px)}
    .btn[disabled]{opacity:.7; cursor:not-allowed; filter:saturate(.75)}
    .btn .shine{
      position:absolute; inset:-40%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      transform: translateX(-70%) rotate(20deg);
      animation: shine 2.6s ease-in-out infinite;
      opacity:.45;
      pointer-events:none;
    }
    .btn .ripple{
      position:absolute;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.42);
      transform: translate(-50%, -50%) scale(0);
      animation: ripple .6s ease-out forwards;
      pointer-events:none;
    }
    @keyframes ripple{
      to{
        transform: translate(-50%, -50%) scale(20);
        opacity: 0;
      }
    }
    @keyframes shine{
      0%,55%{transform: translateX(-75%) rotate(20deg)}
      75%,100%{transform: translateX(75%) rotate(20deg)}
    }

    .helper{
      margin-top:14px;
      font-size:12px;
      color: rgba(234,240,255,.62);
      line-height:1.5;
    }
    .hint{
      display:inline-flex; gap:8px; align-items:center;
      padding:10px 12px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
    }
    .dot{
      width:8px;height:8px;border-radius:999px;
      background: rgba(34,211,238,.85);
      box-shadow: 0 0 0 4px rgba(34,211,238,.12);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.35)}
    }

    .msg{
      margin-top:12px;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      font-size: 13px;
      display:none;
    }
    .msg.err{border-color: rgba(255,92,122,.35); background: rgba(255,92,122,.08)}
    .msg.ok{border-color: rgba(46,229,157,.35); background: rgba(46,229,157,.08)}
    .msg.show{display:block; animation: msgIn .25s ease both}
    @keyframes msgIn{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)}}

    .footer{
      margin-top:14px;
      display:flex; justify-content:space-between; align-items:center;
      font-size:12px; color: rgba(234,240,255,.55);
    }
    .link{
      color: rgba(234,240,255,.85);
      text-decoration:none;
      border-bottom:1px solid rgba(234,240,255,.18);
    }
    .link:hover{border-bottom-color: rgba(34,211,238,.45)}
    .toggle{
      display:inline-flex; align-items:center; gap:8px;
      cursor:pointer; user-select:none;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.25);
      color: rgba(234,240,255,.8);
    }

    .reveal{
      opacity: 0;
      transform: translateY(10px);
      animation: revealUp .42s ease forwards;
      animation-delay: var(--d, 0ms);
    }
    @keyframes revealUp{
      to{
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card.shake{
      animation: shakeX .36s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes shakeX{
      10%,90%{ transform: translateX(-2px) }
      20%,80%{ transform: translateX(3px) }
      30%,50%,70%{ transform: translateX(-5px) }
      40%,60%{ transform: translateX(5px) }
    }

    .cursorDot, .cursorRing{
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .cursorDot{
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(34,211,238,.95);
      box-shadow: 0 0 16px rgba(34,211,238,.45);
    }
    .cursorRing{
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(234,240,255,.45);
      transition: width .2s ease, height .2s ease, border-color .2s ease;
    }
    body.cursorActive .cursorRing{
      width: 40px;
      height: 40px;
      border-color: rgba(34,211,238,.7);
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation: none !important;
        transition: none !important;
      }
      body{ cursor: auto; }
      .cursorDot, .cursorRing{ display:none; }
    }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="wrap">
    <div class="card" role="main" aria-label="Admin login">
      <div class="cardGlare" aria-hidden="true"></div>
      <div class="cardTop">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1><a id="loginBrandTitle" href="./f9b3c1a2.html" style="color:inherit;text-decoration:none">Opanot com</a></h1>
            <p class="sub">Вход по email + ключу. Ключ можно менять (rotation) без почты.</p>
          </div>
        </div>
      </div>

      <div class="cardBody">
        <form id="form" autocomplete="on">
          <div class="field reveal" style="--d:80ms">
            <div class="label">
              <span>Email</span>
              <span class="kbd">admin@example.com</span>
            </div>
            <input class="input" id="email" name="email" type="email" required
                   placeholder="you@domain.com" inputmode="email" />
          </div>

          <div class="field reveal" style="--d:150ms">
            <div class="label">
              <span>Key / Password</span>
              <span class="kbd">paste</span>
            </div>
            <input class="input" id="key" name="key" type="password" required
                   placeholder="opn_xxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
          </div>

          <button class="btn reveal" style="--d:220ms" id="btn" type="submit">
            <span class="shine" aria-hidden="true"></span>
            <span id="btnText">Sign in</span>
          </button>

          <div id="msg" class="msg reveal" style="--d:290ms" aria-live="polite"></div>

          <div class="helper reveal" style="--d:360ms">
            <div class="hint">
              <span class="dot" aria-hidden="true"></span>
              <span>Подсказка: ключ лучше хранить как SSH-ключ (в менеджере паролей). Можно сделать токен на 30 дней.</span>
            </div>
          </div>

          <div class="footer reveal" style="--d:430ms">
            <label class="toggle">
              <input id="showKey" type="checkbox" style="accent-color:#22D3EE">
              <span>Показать ключ</span>
              <span class="kbd">👁</span>
            </label>
            <a class="link" href="/" title="Вернуться на сайт">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="cursorDot" id="cursorDot" aria-hidden="true"></div>
  <div class="cursorRing" id="cursorRing" aria-hidden="true"></div>

  <script src="./pwa-register.js"></script>
  <script src="./login.js"></script>
</body>
</html>
